services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      # This line below is the MAGIC FIX for the ENOTEMPTY error:
      - /app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0"